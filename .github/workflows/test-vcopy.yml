name: Test vcopy Action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Test 1: Basic public copy
  test-basic:
    name: "Test 1: Basic copy"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-01-basic
          public-source: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}
          verbose: true

  # Test 2: No workflows
  test-no-workflows:
    name: "Test 2: No workflows"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-02-no-workflows
          public-source: true
          no-workflows: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 3: No actions
  test-no-actions:
    name: "Test 3: No actions"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-03-no-actions
          public-source: true
          no-actions: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 4: No copilot
  test-no-copilot:
    name: "Test 4: No copilot"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-04-no-copilot
          public-source: true
          no-copilot: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 5: No github (entire .github/)
  test-no-github:
    name: "Test 5: No .github"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-05-no-github
          public-source: true
          no-github: true
          quick-verify: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 6: Code only (no tags/releases)
  test-code-only:
    name: "Test 6: Code only"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-06-code-only
          public-source: true
          code-only: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 7: Skip verify
  test-skip-verify:
    name: "Test 7: Skip verify"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        id: copy
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-07-skip-verify
          public-source: true
          skip-verify: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}
      - name: Check output
        run: |
          echo "Verification status: ${{ steps.copy.outputs.verification-status }}"
          if [ "${{ steps.copy.outputs.verification-status }}" != "skipped" ]; then
            echo "ERROR: Expected 'skipped' but got '${{ steps.copy.outputs.verification-status }}'"
            exit 1
          fi

  # Test 8: Exclude custom paths
  test-exclude:
    name: "Test 8: Exclude paths"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-08-exclude
          public-source: true
          exclude: examples,docs
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 9: Report + upload artifact
  test-report:
    name: "Test 9: Report + artifact"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        id: copy
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-09-report
          public-source: true
          quick-verify: true
          force: true
          report: verification-report.json
          upload-report: true
          artifact-name: test-09-report
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}
      - name: Verify report exists
        run: |
          echo "Report path: ${{ steps.copy.outputs.report-path }}"
          if [ ! -f "verification-report.json" ]; then
            echo "ERROR: Report file not found"
            exit 1
          fi
          echo "Report contents:"
          cat verification-report.json | head -20

  # Test 10: Dry run (should not create any repo)
  test-dry-run:
    name: "Test 10: Dry run"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-10-dry-run
          public-source: true
          dry-run: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 11: Combined flags (no-github + exclude + code-only + skip-verify)
  test-combined:
    name: "Test 11: Combined flags"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-11-combined
          public-source: true
          no-github: true
          code-only: true
          skip-verify: true
          exclude: examples
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 12: Quick verify
  test-quick-verify:
    name: "Test 12: Quick verify"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-12-quick-verify
          public-source: true
          quick-verify: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}

  # Test 13: Visibility flag (public target repo)
  test-visibility:
    name: "Test 13: Visibility"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-13-visibility
          public-source: true
          visibility: public
          skip-verify: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}
          verbose: true

  # Test 14: Deprecated public flag (backward compatibility)
  test-deprecated-public:
    name: "Test 14: Deprecated public"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-14-deprecated-public
          public: true
          skip-verify: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}
          verbose: true

  # Test 15: Explicit visibility private
  test-visibility-private:
    name: "Test 15: Visibility private"
    runs-on: ubuntu-latest
    steps:
      - uses: jpmicrosoft/vcopy@test/visibility-feature
        with:
          source-repo: Azure/terraform-azurerm-avm-res-eventhub-namespace
          target-org: jpmicrosoft
          target-name: action-test-15-visibility-private
          public-source: true
          visibility: private
          skip-verify: true
          target-token: ${{ secrets.TARGET_GITHUB_TOKEN }}
          verbose: true
